<?xml version='1.0' encoding='UTF-8' ?> 
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html">

    <h:head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Gestão de Creche</title>
        <h:outputStylesheet name="layout.css" library="css" />

    </h:head>

    <h:body>
        <div class="container">

            

            <header class="header">
                <ui:insert name="top">                       
                    <h1>#{app.tituloaplicacao}</h1>
                    <p>#{app.nomeinstituicao}</p>
                </ui:insert>
            </header>



            <!-- Painel de Navegação -->
            <nav class="nav">

                <ui:insert name="left">
                    <h3>Menu Principal</h3>
                    <ul>
                        <li><a href="#">🏠 Início</a></li>
                        <li><a href="#">📝 Sobre</a></li>
                        <li><a href="#">💼 Serviços</a></li>
                        <li><a href="#">📞 Contato</a></li>
                        <li><a href="#">📊 Blog</a></li>
                        <li><a href="#">🔍 Portfólio</a></li>
                    </ul>    

                </ui:insert>

            </nav>

            <!-- Conteúdo Principal -->
            <main class="main">

                <ui:insert name="content">
                    <div class="card">

                    </div>

                    <div class="card">

                    </div>

                    <div class="card">

                        <div class="grid-demo">

                            <div class="grid-item">

                                <h:link value="#{app.gestaoalunos}" outcome="/alunos/index_aluno"/>

                            </div>
                            <div class="grid-item">

                                <h:link value="#{app.gestaoencarregado}" outcome="/responsavelbusca/index_responsavel_busca_aluno"/>


                            </div>
                            <div class="grid-item"><h:link value="#{app.gestaopropinas}" outcome="propinas/index_propinas"/></div>
                            <div class="grid-item"> <h:link value="#{app.gestaomatriculas}" outcome="matriculas/index_matriculas"/></div>

                        </div>
                    </div>

                    <div class="card">

                        <div class="grid-demo">

                            <div class="grid-item">

                                <h:link value="#{app.gestaoprofissionais}" outcome="profissionais/index_profissionais"/>

                            </div>
                            <div class="grid-item">

                                <h:link value="#{app.gestaoturmas}" outcome="turmas/index_turmas"/>


                            </div>
                            <div class="grid-item"><h:link value="#{app.gestaoclasses}" outcome="classes/index_classes"/></div>
                            <div class="grid-item"> <h:link value="#{app.gestaotabelas}" outcome="tabelas/index_tabelas"/></div>

                        </div>
                    </div>


                    <div class="card">

                        <div class="grid-demo">

                            <div class="grid-item">

                                <h:link value="#{app.gestaoalocacaoprofessor}" outcome="profissionais/index_profissionais"/>

                            </div>
                            <div class="grid-item">

                                <h:link value="Gestao XY-Outro" outcome="turmas/index_turmas"/>


                            </div>
                            <div class="grid-item"><h:link value="Gestao XY-Outro" outcome="classes/index_classes"/></div>
                            <div class="grid-item"> <h:link value="Gestao XY-Outro" outcome="tabelas/index_tabelas"/></div>

                        </div>
                    </div>

                    <div class="card">

                        <div class="grid-demo">

                            <div class="grid-item">

                                <h:link value="Gestao XY-Outro" outcome="profissionais/index_profissionais"/>

                            </div>
                            <div class="grid-item">

                                <h:link value="Gestao XY-Outro" outcome="turmas/index_turmas"/>


                            </div>
                            <div class="grid-item"><h:link value="Gestao XY-Outro" outcome="classes/index_classes"/></div>
                            <div class="grid-item"> <h:link value="Gestao XY-Outro" outcome="tabelas/index_tabelas"/></div>

                        </div>
                    </div>

                    <div class="card">

                    </div>

                </ui:insert>

            </main>

            <!-- Rodapé -->
            <footer class="footer">

                <ui:insert name="bottom">
                    <p>&copy; #{sis.desenvolvidoporskylink}</p>
                    <h3> #{sis.todososdireitos}</h3>
                </ui:insert>



            </footer>





        </div>
    </h:body>

</html>
