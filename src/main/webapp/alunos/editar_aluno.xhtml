<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="jakarta.faces.core">

    <body>

        <ui:composition template="./../WEB-INF/templates/aluno_template.xhtml">

            <ui:define name="content">
                <h:form>
                    <p:growl id="growl" sticky="true" />
                    <p:panel header="Actualizando dados do aluno(a)">

                        <h:panelGrid columns="2">
                            <p:outputLabel value="Nome:"/>
                            <p:inputText value="#{alunoMBean.aluno.nomeAluno}" required="true"/>
                            <p:outputLabel value="Sobrenome:"/>
                            <p:inputText value="#{alunoMBean.aluno.sobrenomeAluno}" required="true"/>
                            <p:outputLabel value="Data de Nascimento:"/>
                            <p:calendar value="#{alunoMBean.aluno.dataNascimentoAluno}" required="true" pattern="dd/MM/yyyy"/>
                            <p:outputLabel for="sexo" value="Sexo:" />
                            <h:selectOneRadio id="sexo" value="#{alunoMBean.aluno.sexo}" 
                                             converter="omnifaces.SelectItemsConverter" required="true">
                                <f:selectItems value="#{alunoBean.sexos}"  var="sx" itemValue="#{sx}"
                                               itemLabel="#{sx.descricaoSexo}" />
                            </h:selectOneRadio>
                            <p:outputLabel value="Grupo Sanguíneo:"/>
                            <p:inputText value="#{alunoMBean.aluno.grauSanguineoAluno}" required="true"/>
                            <p:outputLabel value="Nº Casa:"/>
                            <p:inputText value="#{alunoMBean.aluno.casaAluno}" required="true"/>
                            <p:outputLabel value="Rua:"/>
                            <p:inputText value="#{alunoMBean.aluno.ruaAluno}" required="true"/>
                            <p:outputLabel value="Bairro:"/>
                            <p:inputText value="#{alunoMBean.aluno.bairroAluno}" required="true"/>
                            <p:outputLabel for="municipio" value="Município:" />
                            <p:selectOneMenu id="municipio" value="#{alunoMBean.aluno.municipio}" required="true" requiredMessage="O campo município é obrigatório" converter="omnifaces.SelectItemsConverter">
                                <f:selectItem itemLabel="Selecione o Municipio..."/>
                                <f:selectItems value="#{alunoMBean.municipios}"
                                               var="m"
                                               itemValue="#{m}"
                                               itemLabel="#{m.nomeMunicipio}" />
                            </p:selectOneMenu>


                        </h:panelGrid>

                    </p:panel>

                    <p:panel header="Encarregados de Educação">
                        <h:panelGrid columns="2">
                            <p:outputLabel value="Nome Mãe:"/>
                            <p:inputText value="#{alunoMBean.aluno.nomeMaeAluno}" required="true"/>
                            <p:outputLabel value="Sobrenome Mãe:"/>
                            <p:inputText value="#{alunoMBean.aluno.sobrenomeMaeAluno}" required="true"/>
                            <p:outputLabel value="Telefone Mãe:"/>
                            <p:inputMask value="#{alunoMBean.aluno.telefoneMaeAluno}" mask="(24) 999 999 999" required="true"/>
                            <p:outputLabel value="Nome Pai:"/>
                            <p:inputText value="#{alunoBean.aluno.nomePaiAluno}" required="true"/>
                            <p:outputLabel value="Sobrenome Pai:"/>
                            <p:inputText value="#{alunoMBean.aluno.sobrenomePaiAluno}" required="true"/>
                            <p:outputLabel value="Telefone Pai:"/>
                            <p:inputMask value="#{alunoMBean.aluno.telefonePaiAluno}" mask="(24) 999 999 999" required="true"/>

                        </h:panelGrid>
                    </p:panel>

                    <p:commandButton  id="update" value="Actualizar" 
                                      action="#{alunoMBean.update}" icon="ui-icon-disk" update="growl">
                        <f:ajax execute="@form" render="@form"/>
                    </p:commandButton>
                </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
