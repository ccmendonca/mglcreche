<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

    <body>

        <ui:composition  template="./../WEB-INF/templates/aluno_template.xhtml">

            <ui:define name="content">
                <f:view>
                    <h:form>
                        <p:fieldset legend="Histórico do Aluno">
                        <h:panelGrid columns="2">
                            <p:outputLabel value="Código:  "/>
                            <h:outputText value="#{alunoMBean.aluno.idAluno}"/>
                            <p:outputLabel value="Nome:  "/>
                            <h:outputText value="#{alunoMBean.aluno.nomeAluno}"/>
                            <p:outputLabel value="Sobrenome:  "/>
                            <h:outputText value="#{alunoMBean.aluno.sobrenomeAluno}"/>
                            <p:outputLabel value="Data de Nascimento:  "/>
                            <h:outputText value="#{alunoMBean.aluno.dataNascimentoAluno}"/>
                            <p:outputLabel value="Género:  "/>
                            <h:outputText value="#{alunoMBean.aluno.sexo.descricaoSexo}"/>
                            <p:outputLabel value="Grupo Sanguíneo:  "/>
                            <h:outputText value="#{alunoMBean.aluno.grauSanguineoAluno}"/>
                            <p:outputLabel value="Município:  "/>
                            <h:outputText value="#{alunoMBean.aluno.municipio.nomeMunicipio}"/>
                        </h:panelGrid>
                        </p:fieldset>
                    </h:form>
                </f:view>
            </ui:define>
        </ui:composition>

    </body>
</html>
