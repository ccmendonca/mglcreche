<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:h="jakarta.faces.html">

    <body>

        <ui:composition template="./../WEB-INF/templates/aluno_template.xhtml">

            <ui:define name="content">
                
                  <f:view>
                    <center style="margin: 20px;">
                        <h:form id="pesquisa">
                            <p:inputText value="#{alunoBean.dado}" size="90" placeholder="Escreva parte do número de aluno, nome ou sobrenome"/>
                            <p:commandButton value="Pesquisar" action="#{alunoBean.findParameter}" update=":frmAlunos:tblAlunos" icon="fa fa-fw fa-search"/>
                        </h:form>
                    </center>

                    <h:form id="frmAlunos">
                        <h:messages showDetail="true" showSummary="true"/>
                        <p:dataTable id="tblAlunos" value="#{alunoBean.pesquisado}" var="aluno" emptyMessage="Nenhum(a) aluno(a) encontrado(a)" rows="20"
                                     paginator="true" paginatorPosition="bottom"
                                     paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                     currentPageReportTemplate="{startRecord}-{endRecord} of {totalRecords} records"
                                     rowsPerPageTemplate="10,20,{ShowAll|'All'}">
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="N.º Registo"/>
                                </f:facet>
                                <h:outputText value="#{aluno.idAluno}"/>
                            </p:column>
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Nome"/>
                                </f:facet>
                                <h:outputText value="#{aluno.nomeAluno} #{aluno.sobrenomeAluno}"/>
                            </p:column>
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Data Nascimento"/>
                                </f:facet>
                                <h:outputText value="#{aluno.dataNascimentoAluno}">
                                    <f:convertDateTime type="date" pattern="dd/MM/yyyy"/>
                                </h:outputText>
                            </p:column>
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="N.º Casa"/>
                                </f:facet>
                                <h:outputText value="#{aluno.casaAluno}"/>
                            </p:column>
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Rua"/>
                                </f:facet>
                                <h:outputText value="#{aluno.ruaAluno}"/>
                            </p:column>                                                     
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="Bairro"/>
                                </f:facet>
                                <h:outputText value="#{aluno.bairroAluno}"/>
                            </p:column>
                                <p:column headerText="Operações">
                                <p:commandButton value="Histórico" action="#{alunoMBean.selectEstudante(aluno)}"/>
                                
                            </p:column>
                            <p:column headerText="Operações">
                                <p:commandButton value="Editar" icon="pi pi-pencil" action="#{alunoMBean.selectAluno(aluno)}" title="Ver Detalhes" styleClass="ui-button-warning" />
                            </p:column>
                        </p:dataTable>
                    </h:form>
                   
                </f:view>
                
            </ui:define>

        </ui:composition>

    </body>
</html>
