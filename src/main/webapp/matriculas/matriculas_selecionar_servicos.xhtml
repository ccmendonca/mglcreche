<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

    <body>

        <ui:composition template="./../WEB-INF/templates/matriculas_templete.xhtml">

            <ui:define name="content">
                <h:form style="font-size: 2rem">

                    #{servicoMBean.aluno.nomeAluno}

                    #{servicoMBean.aluno.sobrenomeAluno}  
                    <hr/>
                </h:form>

                <h:form id="mesesseleccionados">
                    <p:dataTable id="dtblservicos" var="item" value="#{servicoMBean.servicos}" scrollable="true" scrollHeight="600" lazy="false">
                        <p:column headerText="Serviço">
                            <h:outputText value="#{item.descricaoServico}"/>
                        </p:column>

                        <p:column headerText="Valor Matrícula">
                            <h:outputText value="#{item.precoServico}"/>
                        </p:column>
                        <p:column headerText="Seleccionar o Serviço">

                            <p:commandButton value="Selecionar" action="#{cestoMatriculaDetalheMBean.adicionarServicoCesto(servico)}"/>
                        </p:column>
                    </p:dataTable>
                </h:form>


                <h:form>
                    <p:commandButton value="Ver serviços seleccionados" action="matricula_cesto_servicos_selecionados?faces-redirect=true"/>

                </h:form>
            </ui:define>
            
        </ui:composition>

    </body>
</html>
