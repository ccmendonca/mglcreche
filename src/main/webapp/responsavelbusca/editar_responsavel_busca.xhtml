<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:h="jakarta.faces.html">
    <body>
        <ui:composition template="./../WEB-INF/templates/responsavel_busca_aluno_template.xhtml">
            <ui:define name="content">
                <f:view>
                <h:form id="formResponsavel">
                    <p:growl id="growl" showDetail="true" sticky="false" life="4000" />
                    
                        <p:panelGrid columns="4" layout="grid">

                            <p:outputLabel for="nome" value="Nome:" />
                            <p:inputText id="nome" 
                                         value="#{responsavelBuscaAlunoBean.responsavel.nomeResponsavel}" 
                                         required="true" 
                                         requiredMessage="Nome é obrigatório" />

                            <p:outputLabel for="sobrenome" value="Sobrenome:" />
                            <p:inputText id="sobrenome" 
                                         value="#{responsavelBuscaAlunoBean.responsavel.sobrenomeResponsavel}" 
                                         required="true"
                                         requiredMessage="Sobrenome é obrigatório" />

                            <p:outputLabel for="dataNasc" value="Data de Nascimento:" />
                            <p:datePicker id="dataNasc" 
                                          value="#{responsavelBuscaAlunoBean.responsavel.dataNascimentoResponsavel}" 
                                          pattern="dd/MM/yyyy" 
                                          showIcon="true" 
                                          />

                            <p:outputLabel for="telefone" value="Telefone:" />
                            <p:inputMask id="telefone" 
                                         value="#{responsavelBuscaAlunoBean.responsavel.telefoneResponsavel}" 
                                         mask="(24) 999 999 999"
                                         required="true"
                                         requiredMessage="Telefone é obrigatório" />


                            <p:outputLabel for="bairro" value="Bairro:" />
                            <p:inputText id="bairro" 
                                         value="#{responsavelBuscaAlunoBean.responsavel.bairroResponsavel}" 
                                         required="true"
                                         requiredMessage="Bairro é obrigatório" />

                            <p:outputLabel for="rua" value="Rua:" />
                            <p:inputText id="rua" 
                                         value="#{responsavelBuscaAlunoBean.responsavel.ruaResponsavel}" 
                                         required="true"
                                         requiredMessage="Rua é obrigatória" />

                            <p:outputLabel for="casa" value="Nº da Casa:" />
                            <p:inputText id="casa" 
                                         value="#{responsavelBuscaAlunoBean.responsavel.casaResponsavel}" />

                            <p:outputLabel for="municipio" value="Município:" />
                            <h:selectOneMenu id="municipio" value="#{responsavelBuscaAlunoBean.responsavel.idMunicipio}" required="true" requiredMessage="Município é obrigatório">
                                <f:selectItem itemLabel="Selecione o Municipio..." itemValue="" />
                                <f:selectItems value="#{responsavelBuscaAlunoBean.listaMunicipios}"
                                               var="m"
                                               itemValue="#{m.idMunicipio}"
                                               itemLabel="#{m.nomeMunicipio}" />
                            </h:selectOneMenu>

                            <p:outputLabel for="sexo" value="Sexo:" />
                            <h:selectOneRadio id="sexo" value="#{responsavelBuscaAlunoBean.responsavel.idSexo}" 
                                              required="true">
                                <f:selectItems value="#{responsavelBuscaAlunoBean.listaSexos}"  var="s" itemValue="#{s.idSexo}"
                                               itemLabel="#{s.descricaoSexo}" />
                            </h:selectOneRadio>

                        </p:panelGrid>

                        <p:separator />

                        <p:commandButton id="btnSalvar"
                                         value="Guardar" 
                                         action="#{responsavelBuscaAlunoBean.salvar}" 
                                         icon="pi pi-save"
                                         update="growl formResponsavel" 
                                         validateClient="true" />

                    
                </h:form>
                </f:view>
            </ui:define>
        </ui:composition>
    </body>
</html>
