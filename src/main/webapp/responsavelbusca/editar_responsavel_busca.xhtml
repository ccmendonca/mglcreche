<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

    <body>

        <ui:composition template="./../WEB-INF/templates/responsavel_busca_aluno_template.xhtml">

            <ui:define name="content">
                <f:view>
                    <h:form> 
                        <p:growl id="growl" sticky="true" />
                        <p:panel header="Editar Os Dados do Responsavel da busca do Aluno">

                            <p:panelGrid columns="4" layout="grid">

                                <p:outputLabel for="nome" value="Nome:" />
                                <p:inputText id="nome" value="#{responsavelBean.responsavel.nomeResponsavel}" required="true" />
                                <p:outputLabel for="sobrenome" value="Sobrenome:" />
                                <p:inputText id="sobrenome" value="#{responsavelBean.responsavel.sobrenomeResponsavel}" required="true" />
                                <p:outputLabel for="dataNasc" value="Data de Nascimento:" />
                                <p:calendar id="dataNasc" value="#{responsavelBean.responsavel.dataNascimentoResponsavel}" 
                                            pattern="dd/MM/yyyy" showOn="button" navigator="true" />
                                <p:outputLabel for="telefone" value="Telefone:" />
                                <p:inputMask id="telefone" value="#{responsavelBean.responsavel.telefoneResponsavel}" mask="(244) 999999999"
                                             requiredMessage="O nome é obrigatório."/>

                                <p:outputLabel for="municipio" value="Municipio:" />
                                <p:inputText id="municipio" value="#{responsavelBean.responsavel.municipioResponsavel}" />
                                <p:outputLabel for="bairro" value="Bairro:" />
                                <p:inputText id="bairro" value="#{responsavelBean.responsavel.bairroResponsavel}" />
                                <p:outputLabel for="rua" value="Rua:" />
                                <p:inputText id="rua" value="#{responsavelBean.responsavel.ruaResponsavel}" />
                                <p:outputLabel for="casa" value="Nº da Casa:" />
                                <p:inputText id="casa" value="#{responsavelBean.responsavel.casaResponsavel}" />

                            </p:panelGrid>


                            <p:commandButton  id="save" value="Salvar Alterações" 
                                              action="#{responsavelBean.atualizar}" icon="ui-icon-disk" update="growl">

                            </p:commandButton>



                        </p:panel>
                    </h:form>
                </f:view>
            </ui:define>

        </ui:composition>

    </body>
</html>
