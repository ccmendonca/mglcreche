<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:h="jakarta.faces.html">

    <body>
        <ui:composition template="./../WEB-INF/templates/responsavel_busca_aluno_template.xhtml">

            <ui:define name="content">
                <f:view>
                    <h:form id="formPesquisa">
                        <p:growl id="growl" showDetail="true" sticky="false" life="4000" />

                        <p:toolbar>
                            <p:toolbarGroup align="left">

                                <p:inputText id="pesquisa"
                                             value="#{responsavelBuscaAlunoBean.nomeResponsavel}"
                                             placeholder="Pesquisar por nome, sobrenome ou telefone..."
                                             style="width: 400px;" />

                                <p:commandButton value="Pesquisar"
                                                 icon="pi pi-search"
                                                 action="#{responsavelBuscaAlunoBean.pesquisa}"
                                                 update="formTabela:tabela"
                                                 style="margin-left: 8px;" />

                                <p:commandButton value="Listar Todos"
                                                 icon="pi pi-list"
                                                 action="#{responsavelBuscaAlunoBean.pesquisa}"
                                                 update="formTabela:tabela"
                                                 styleClass="ui-button-secondary"
                                                 style="margin-left: 4px;"
                                                 immediate="true">

                                    <f:setPropertyActionListener value=""
                                                                 target="#{responsavelBuscaAlunoBean.nomeResponsavel}" />

                                </p:commandButton>

                            </p:toolbarGroup>
                        </p:toolbar>
                    </h:form>
                    <h:form id="formTabela">

                        <p:dataTable id="tabela"
                                     value="#{responsavelBuscaAlunoBean.listaResponsaveis}"
                                     var="resp"
                                     paginator="true"
                                     rows="10"
                                     rowsPerPageTemplate="5,10,20"
                                     paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                     currentPageReportTemplate="{startRecord}-{endRecord} de {totalRecords}"
                                     emptyMessage="Nenhum responsável encontrado."
                                     stripedRows="true"
                                     style="margin-top: 10px;">

                            <p:column headerText="Nº Registo" width="80" style="text-align:center;">
                                <h:outputText value="#{resp.idResponsavel}" />
                            </p:column>

                            <p:column headerText="Nome Completo">
                                <h:outputText value="#{resp.nomeResponsavel} #{resp.sobrenomeResponsavel}" />
                            </p:column>

                            <p:column headerText="Telefone" width="140">
                                <h:outputText value="#{resp.telefoneResponsavel}" />
                            </p:column>

                            <p:column headerText="Bairro / Rua">
                                <h:outputText value="#{resp.bairroResponsavel}, #{resp.ruaResponsavel}, nº #{resp.casaResponsavel}" />
                            </p:column>

                            <p:column headerText="Nascimento" width="110" style="text-align:center;">
                                <h:outputText value="#{resp.dataNascimentoResponsavel}">
                                    <f:convertDateTime pattern="dd/MM/yyyy" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Data Registo" width="130" style="text-align:center;">
                                <h:outputText value="#{resp.dataRegistoResponsavel}">
                                    <f:convertDateTime pattern="dd/MM/yyyy HH:mm" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Operações" width="120" style="text-align:center;">
                                <p:commandButton value="Editar"
                                                 action="#{responsavelBuscaAlunoBean.editar(resp)}"
                                                 ajax="false" />
                            </p:column>

                        </p:dataTable>

                        <p:confirmDialog global="true" showEffect="fade" hideEffect="fade">
                            <p:commandButton value="Sim" type="button"
                                             styleClass="ui-confirmdialog-yes ui-button-danger"
                                             icon="pi pi-check" />
                            <p:commandButton value="Não" type="button"
                                             styleClass="ui-confirmdialog-no ui-button-secondary"
                                             icon="pi pi-times" />
                        </p:confirmDialog>

                    </h:form>

                </f:view>
            </ui:define>

        </ui:composition>
    </body>
</html>
