<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

    <body>

        <ui:composition template="./../WEB-INF/templates/servicos_templete.xhtml">

            <ui:define name="content">
                <f:view>
                    
                    
                    <p:panel header="Servicços disponiveis">

                    <p:dataTable var="item" value="#{servicoMBean.servicos}" emptyMessage="Nenhum mẽs seleccionado">
                        <p:column headerText="Mês">
                            <h:outputText value="#{item.idServico}"/>
                        </p:column>

                        <p:column headerText="Preço">
                            <h:outputText value="#{item.descricaoServico}"/>
                        </p:column>

                        <p:column headerText="Preço">
                            <h:outputText value="#{item.precoServico}">
                                <f:convertNumber pattern="#,##0.00" currencySymbol="KZ"/>
                            </h:outputText>
                        </p:column>

                    </p:dataTable>

                   
                </p:panel>

                    
                    
                </f:view>

                
            </ui:define>

        </ui:composition>

    </body>
</html>
