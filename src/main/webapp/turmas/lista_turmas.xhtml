<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

    <body>

        <ui:composition template="./../WEB-INF/templates/turma_template.xhtml">

            <ui:define name="content">
                <f:view>
                    <h:form id="formListagem">
                        <p:growl id="growl" showDetail="true" sticky="false" life="4000" />

                        <p:panel header="Lista de Turmas">

                            <p:toolbar>
                                <p:toolbarGroup>
                                    <p:outputLabel for="filtroPesquisa" value="Pesquisar: " style="margin-right: 10px" />
                                    <p:inputText id="filtroPesquisa"
                                                 value="#{turmaBean.filtroDescricao}"
                                                 placeholder="Descrição da turma..." 
                                                 style="width: 250px; margin-right: 10px" />
                                    <p:commandButton value="Pesquisar"
                                                     action="#{turmaBean.pesquisar}"
                                                     icon="pi pi-search"
                                                     update="tabelaTurmas growl"
                                                     styleClass="ui-button-info" />
                                    <p:commandButton value="Limpar"
                                                     action="#{turmaBean.limparPesquisa}"
                                                     icon="pi pi-times"
                                                     update="formListagem"
                                                     process="@this"
                                                     styleClass="ui-button-secondary" />
                                </p:toolbarGroup>
                            </p:toolbar>

                            <p:separator />

                            <p:dataTable id="tabelaTurmas"
                                         value="#{turmaBean.turmas}"
                                         var="t"
                                         paginator="true"
                                         rows="10"
                                         rowsPerPageTemplate="5,10,20"
                                         paginatorPosition="bottom"
                                         emptyMessage="Nenhuma turma encontrada."
                                         selectionMode="single"
                                         selection="#{turmaBean.turmaSelecionada}"
                                         rowKey="#{t.idTurma}"
                                         stripedRows="true">

                                <p:column headerText="Cód." style="width:60px; text-align:center;">
                                    <h:outputText value="#{t.idTurma}" />
                                </p:column>

                                <p:column headerText="Descrição" sortBy="#{t.descricaoTurma}">
                                    <h:outputText value="#{t.descricaoTurma}" />
                                </p:column>

                                <p:column headerText="Ano Lectivo">
                                    <h:outputText value="#{t.anoLectivo.descricaoAnoLectivo}" />
                                </p:column>

                                <p:column headerText="Classe">
                                    <h:outputText value="#{t.classe.descricaoClasse}" />
                                </p:column>


                                <p:column headerText="Sala">
                                    <h:outputText value="#{t.sala.descricaoSala}" />
                                </p:column>

                                <p:column headerText="Nº Máximo" style="width:100px; text-align:center;">
                                    <h:outputText value="#{t.numeroMaximo}" />
                                </p:column>

                                <p:column headerText="Data Registo" style="width:110px; text-align:center;">
                                    <h:outputText value="#{t.dataRegisto}">
                                        <f:convertDateTime pattern="dd/MM/yyyy" />
                                    </h:outputText>
                                </p:column>

                                <p:column headerText="Activa" style="width:80px; text-align:center;">
                                    <p:tag value="#{t.activa ? 'Sim' : 'Não'}" 
                                           severity="#{t.activa ? 'success' : 'danger'}" />
                                </p:column>


                            </p:dataTable>
                        </p:panel>
                    </h:form>
                </f:view>
            </ui:define>

            <ui:define name="bottom">
                &copy; 2026 - Gestão de Creche - Todos os direitos reservados.
            </ui:define>

        </ui:composition>

    </body>
</html>
